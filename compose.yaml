services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: helpdesk-db
    environment:
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
        
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: HelpDeskTickets.WebApi/Dockerfile
    ports:
      - "5127:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION}"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./helpdesk-ui
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_BASE: "http://api:8080"
    depends_on:
      - api

volumes:
  sql_data: